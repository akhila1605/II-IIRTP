<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            margin: auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 0px gray;
        }

        h1 {
            color: #333;
        }

        .selected {
            color: green;
            font-size: 24px;
            font-weight: bold;
        }

        .rejected {
            color: red;
            font-size: 24px;
            font-weight: bold;
        }

        .suggestions {
            margin-top: 20px;
            text-align: left;
        }

        ul {
            margin-top: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background: darkblue;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Resume Screening Result</h1>

        {% if result == "Selected" %}
            <p class="selected">🎉 Congratulations! You are Selected</p>
        {% else %}
            <p class="rejected">❌ Sorry! You are Rejected</p>

            <div class="suggestions">
                <h3>Suggestions to Improve:</h3>
                <ul>
                    {% for suggestion in suggestions %}
                        <li>{{ suggestion }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <a href="/">Try Again</a>
    </div>
</body>
</html>
